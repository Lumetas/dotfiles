# Основные настройки терминала
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"
set -ga terminal-overrides '*:Smulx=\E[4::%p1%dm'
set -ga terminal-overrides '*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
set -ga terminal-overrides ",*:RGB"

# Основной префикс (Ctrl+A)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Мышь и скролл
set -g mouse on
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e; send-keys -M'"
bind -n WheelDownPane select-pane -t= \; send-keys -M

# Копирование в стиле vi
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

# Нумерация окон с 1
set -g base-index 1
set -g pane-base-index 1

# Автоматическое переименование окон
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

# Красивый статус-бар
set -g status-interval 1
set -g status-justify left
set -g status-left-length 200
set -g status-right-length 200
set -g status-style 'bg=#333333 fg=#ffffff'
set -g status-left "#[fg=#ffffff,bg=#0087ff,bold] #S #[fg=#0087ff,bg=#333333,nobold]"
set -g window-status-format "#[fg=#ffffff,bg=#333333] #I:#W "
set -g window-status-current-format "#[fg=#ffffff,bg=#0087ff] #I:#W #[fg=#0087ff,bg=#333333]"

# Цвета диалоговых окон
set -g message-style 'fg=#ffffff,bg=#0087ff'
set -g message-command-style 'fg=#ffffff,bg=#0087ff'
set -g mode-style 'fg=#ffffff,bg=#333333'
set -g window-status-current-style 'fg=#ffffff,bg=#0087ff'
set -g pane-border-style 'fg=#333333 bg=#333333'
set -g pane-active-border-style 'fg=#0087ff bg=#333333'

# Не закрывать tmux при отсоединении
set -g detach-on-destroy off

# Быстрое переключение между последними окнами
bind-key C-a last-window

# ------------------------------------------------------------------------------
# LEADER MODE (C-a Space)
# ------------------------------------------------------------------------------

# Входим в "режим" по C-a Space
bind Space run-shell "tmux set -g @leader-mode on"

# Навигация по панелям (работает только в режиме)
bind -n h if-shell -F '#{==:#{@leader-mode},on}' "select-pane -L" "send-keys h"
bind -n j if-shell -F '#{==:#{@leader-mode},on}' "select-pane -D" "send-keys j"
bind -n k if-shell -F '#{==:#{@leader-mode},on}' "select-pane -U" "send-keys k"
bind -n l if-shell -F '#{==:#{@leader-mode},on}' "select-pane -R" "send-keys l"

# Создание панелей и окон
bind -n v if-shell -F '#{==:#{@leader-mode},on}' "split-window -h -c '#{pane_current_path}'" "send-keys v"
bind -n s if-shell -F '#{==:#{@leader-mode},on}' "split-window -v -c '#{pane_current_path}'" "send-keys s"
bind -n c if-shell -F '#{==:#{@leader-mode},on}' "new-window -c '#{pane_current_path}'" "send-keys c"

# Навигация по окнам (вкладкам)
bind -n p if-shell -F '#{==:#{@leader-mode},on}' "previous-window" "send-keys p"
bind -n n if-shell -F '#{==:#{@leader-mode},on}' "next-window" "send-keys n"
bind -n Tab if-shell -F '#{==:#{@leader-mode},on}' "last-window" "send-keys Tab"

# Переключение на окно по номеру (цифры 1-9)
bind -n 1 if-shell -F '#{==:#{@leader-mode},on}' "select-window -t 1" "send-keys 1"
bind -n 2 if-shell -F '#{==:#{@leader-mode},on}' "select-window -t 2" "send-keys 2"
bind -n 3 if-shell -F '#{==:#{@leader-mode},on}' "select-window -t 3" "send-keys 3"
bind -n 4 if-shell -F '#{==:#{@leader-mode},on}' "select-window -t 4" "send-keys 4"
bind -n 5 if-shell -F '#{==:#{@leader-mode},on}' "select-window -t 5" "send-keys 5"
bind -n 6 if-shell -F '#{==:#{@leader-mode},on}' "select-window -t 6" "send-keys 6"
bind -n 7 if-shell -F '#{==:#{@leader-mode},on}' "select-window -t 7" "send-keys 7"
bind -n 8 if-shell -F '#{==:#{@leader-mode},on}' "select-window -t 8" "send-keys 8"
bind -n 9 if-shell -F '#{==:#{@leader-mode},on}' "select-window -t 9" "send-keys 9"
bind -n 0 if-shell -F '#{==:#{@leader-mode},on}' "select-window -t 10" "send-keys 0"

# Перемещение окон (реордер)
bind -n "{" if-shell -F '#{==:#{@leader-mode},on}' "swap-window -t -1" "send-keys {"
bind -n "}" if-shell -F '#{==:#{@leader-mode},on}' "swap-window -t +1" "send-keys }"

# Закрытие/управление
bind -n , if-shell -F '#{==:#{@leader-mode},on}' "command-prompt 'rename-window %%'" "send-keys ,"
bind -n . if-shell -F '#{==:#{@leader-mode},on}' "command-prompt 'rename-session %%'" "send-keys ."
bind -n z if-shell -F '#{==:#{@leader-mode},on}' "resize-pane -Z" "send-keys z"
bind -n x if-shell -F '#{==:#{@leader-mode},on}' "kill-pane" "send-keys x"
bind -n '&' if-shell -F '#{==:#{@leader-mode},on}' "kill-window" "send-keys '&'"
bind -n d if-shell -F '#{==:#{@leader-mode},on}' "detach-client" "send-keys d"
bind -n r if-shell -F '#{==:#{@leader-mode},on}' "source-file ~/.tmux.conf; display 'Config reloaded!'" "send-keys r"

# Поиск окна
bind -n f if-shell -F '#{==:#{@leader-mode},on}' "command-prompt 'find-window %%'" "send-keys f"

# Листание панелей
bind -n o if-shell -F '#{==:#{@leader-mode},on}' "select-pane -t :.+" "send-keys o"
bind -n ';' if-shell -F '#{==:#{@leader-mode},on}' "select-pane -t :.-" "send-keys ';'"

# Изменение размера панелей (с модификаторами)
bind -n M-h if-shell -F '#{==:#{@leader-mode},on}' "resize-pane -L 5" "send-keys M-h"
bind -n M-j if-shell -F '#{==:#{@leader-mode},on}' "resize-pane -D 5" "send-keys M-j"
bind -n M-k if-shell -F '#{==:#{@leader-mode},on}' "resize-pane -U 5" "send-keys M-k"
bind -n M-l if-shell -F '#{==:#{@leader-mode},on}' "resize-pane -R 5" "send-keys M-l"

# Выход из режима
bind -n Escape if-shell -F '#{==:#{@leader-mode},on}' "set -g @leader-mode ''" "send-keys Escape"
bind -n q if-shell -F '#{==:#{@leader-mode},on}' "set -g @leader-mode ''" "send-keys q"
bind -n Space if-shell -F '#{==:#{@leader-mode},on}' "set -g @leader-mode ''" "send-keys Space"
bind -n C-a if-shell -F '#{==:#{@leader-mode},on}' "set -g @leader-mode ''; send-prefix" "send-keys C-a"

# Показываем статус режима в статус-баре
set -g status-right "#{?@leader-mode,🔷 LEADER ,}#[fg=#0087ff,bg=#333333]#[fg=#ffffff,bg=#0087ff] %H:%M #[fg=#ffffff,bg=#0087ff]%Y-%m-%d "
