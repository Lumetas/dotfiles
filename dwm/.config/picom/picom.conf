#################################
#          Shadows              #
#################################

shadow = true;
shadow-radius = 18;
shadow-opacity = 0.75;
shadow-offset-x = -15;
shadow-offset-y = -15;
shadow-color = "#000000"

# Исключения для теней
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g ?= 'Notify-osd'",
  "class_g = 'Cairo-clock'",
  "_GTK_FRAME_EXTENTS@:c",
  "_NET_WM_STATE@:32a *= '_NET_WM_STATE_HIDDEN'"
];

#################################
#           Fading              #
#################################

fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;

# Исключения для затухания
no-fading-openclose = false;
no-fading-destroyed-argb = false;

#################################
#   Transparency / Opacity      #
#################################

inactive-opacity = 0.95;
active-opacity = 1.0;
frame-opacity = 0.9;
inactive-opacity-override = false;

# Исключения для прозрачности
opacity-rule = [
  "100:class_g = 'Alacritty'",
  "100:class_g = 'firefox' && focused",
  "90:class_g = 'firefox' && !focused",
  "100:class_g = 'Code'",
  "90:class_g = 'discord'",
  "100:class_g = 'dmenu'",
  "85:class_g = 'Rofi'",
  "100:class_g ?= 'com.github.wwmm.easyeffects'"
];

#################################
#     Background Blurring       #
#################################

blur: {
  method = "dual_kawase";
  strength = 6;
  background = true;
  background-frame = false;
  background-fixed = true;
  
  # Экспериментальный блюр для прозрачности
  kern = "3x3box";
}

# Исключения для блюра
blur-background-exclude = [
  # "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'slop'",
  # "class_g = 'Polybar'",
  "class_g = 'dwm'",
  "_GTK_FRAME_EXTENTS@:c"
];

#################################
#       Rounded Corners         #
#################################


corner-radius = 15;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'Polybar'",
  # "class_g = 'dmenu'",
  "class_g = 'Rofi'"
];
round-borders = 1;
round-borders-exclude = [];

#################################
#           General             #
#################################

backend = "glx";
vsync = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
glx-no-stencil = true;
use-damage = true;

# Фикс для Nvidia
glx-no-rebind-pixmap = true;

# Экспериментальные фичи
experimental-backends = true;

# Отрисовка без разрывов
unredir-if-possible = false;
unredir-if-possible-delay = 0;
unredir-if-possible-exclude = [];

# Оконные типы
wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 0.85; focus = true; };
  dock = { shadow = false; opacity = 1.0; };
  dnd = { shadow = false; };
  popup_menu = { opacity = 0.95; };
  dropdown_menu = { opacity = 0.95; };
};

