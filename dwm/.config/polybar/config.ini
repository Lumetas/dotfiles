[module/workspaces]
background = ${colors.background}
type = internal/xworkspaces
name-format = %name%
pin-workspaces = true

label-active = %name%
label-active-background = ${module/workspaces.background}
label-active-foreground = #fff
label-active-underline = #fff
label-active-padding = 1

label-occupied = %name%
label-occupied-background = ${module/workspaces.background}
label-occupied-foreground = #aaa
label-occupied-padding = 1

label-urgent = %name%
label-urgent-padding = 1
label-urgent-underline = #a34c65
label-urgent-foreground = #a34c65
label-urgent-background = ${module/workspaces.background}

label-empty = 
label-empty-foreground = #00000000
label-empty-background = ${module/workspaces.background}
label-empty-padding = 0

[colors]
background = #00000000
background-alt = #0e4466  
foreground = #d6b8a1      
foreground-alt = #bb794a  
primary = #53b0bc         
secondary = #a34c65       
alert = #a34c65           
success = #53b0bc         
warning = #d6b8a1         
info = #308fad            

transparent = #00000000

; Цвета для тегов/рабочих столов (из раздела bar в config.h)
active = #5A5775          
inactive = #5A5775        
urgent = #5A5775          

[bar/mybar]
; Геометрия
monitor = ${env:MONITOR:}
width = 100%
height = 28
offset-x = 0
offset-y = 0
radius = 12.0
fixed-center = true
wm-restack = generic
override-redirect = true

; Цвета
background = ${colors.background}
foreground = ${colors.foreground}

; Шрифты (должны соответствовать dwm)
font-0 = "monospace:Bold:size=12;3"
font-1 = "FontAwesome:Bold:size=12;3"
font-2 = "Material Design Icons:Bold:size=12;3"

; Модули
modules-left = xwindow
modules-center = workspaces 
modules-right = battery xkeyboard date

; Оформление
line-size = 2
line-color = #00000000
padding-left = 0
padding-right = 2
module-margin-left = 1
module-margin-right = 1

; Прочие настройки
tray-position = right
; tray-detached = false
tray-maxsize = 20
tray-background = #373737

[module/launcher]
type = custom/text
content = 
content-background = ${colors.background-alt}
content-foreground = ${colors.primary}
content-padding = 2
content-radius = 8
click-left = rofi -show drun


[module/xkeyboard]
type = internal/xkeyboard

blacklist-0 = num lock
blacklist-1 = scroll lock

label-layout = %layout%
label-layout-padding = 0
label-layout-foreground = #fff

; Настройка вида для индикаторов (Caps Lock и др.), если они не в черном списке
label-indicator-padding = 0
label-indicator-margin = 0
label-indicator-foreground = ${colors.background}
label-indicator-background = #fff


[module/xwindow]
type = internal/xwindow
label = %instance%

label-maxlen = 50
label-foreground = #fff
label-background = ${colors.background}
label-padding = 0



[module/pulseaudio]
type = internal/pulseaudio

format-volume = <ramp-volume> <label-volume>
format-volume-background = ${colors.background-alt}
format-volume-foreground = ${colors.foreground}
format-volume-padding = 0
format-volume-radius = 8

label-volume = %percentage%%
label-muted = 🔇
label-muted-foreground = ${colors.inactive}

ramp-volume-0 = 🔈
ramp-volume-1 = 🔉
ramp-volume-2 = 🔊

click-right = pavucontrol &
click-left = pactl set-sink-mute @DEFAULT_SINK@ toggle
scroll-up = pactl set-sink-volume @DEFAULT_SINK@ +5%
scroll-down = pactl set-sink-volume @DEFAULT_SINK@ -5%

[module/memory]
type = internal/memory
interval = 2
format-prefix = " "
format = <label>
format-background = ${colors.background-alt}
format-foreground = ${colors.foreground}
format-padding = 0
format-radius = 8

label = %percentage_used%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " "
format = <label>
format-background = ${colors.background}
format-foreground = ${colors.foreground}
format-padding = 0
format-radius = 8

label = %percentage%%

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 98
poll-interval = 5

format-charging = <animation-charging> <label-charging>
format-charging-background = ${colors.background}
format-charging-foreground = #fff
format-charging-padding = 2
format-charging-radius = 8

format-discharging = <ramp-capacity> <label-discharging>
format-discharging-background = ${colors.background}
format-discharging-foreground = #fff
format-discharging-padding = 2
format-discharging-radius = 8

format-full = <ramp-capacity> <label-full>
format-full-background = ${colors.background}
format-full-foreground = #fff
format-full-padding = 2
format-full-radius = 8

label-charging = %percentage%%
label-discharging = %percentage%%
label-full = Full

ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 

animation-charging-0 = 
animation-charging-1 = 
animation-charging-2 = 
animation-charging-3 = 
animation-charging-4 = 
animation-charging-framerate = 750

[module/date]
type = internal/date
interval = 1

date = %a %d
time = %H:%M

format = <label>
format-background = ${colors.background}
format-foreground = #fff
format-padding = 2
format-radius = 8

label =  %time%  %date%

[settings]
screenchange-reload = true
pseudo-transparency = false

[global/wm]
margin-top = 0
margin-bottom = 0



