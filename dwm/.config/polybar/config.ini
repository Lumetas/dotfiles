[colors]
; Основные цвета из dwm конфига
background = ${env:COLOR_DARK0:#0C0B15}
background-alt = ${env:COLOR_DARK1:#1D1A35}
foreground = ${env:COLOR_TEXT_NORMAL:#D18AFF}
foreground-alt = ${env:COLOR_LIGHT0:#E0B0FF}
primary = ${env:COLOR_LIGHT0:#E0B0FF}
secondary = ${env:COLOR_LIGHT2:#C792EA}
alert = ${env:COLOR_ACCENT_RED:#FF6B8B}
success = ${env:COLOR_ACCENT_GREEN:#8AFF80}
warning = ${env:COLOR_ACCENT_YELLOW:#FFD166}
info = ${env:COLOR_ACCENT_BLUE:#82C4FF}

; Цвета для тегов/рабочих столов
active = ${env:COLOR_BAR_ACTIVE:#E0B0FF}
inactive = ${env:COLOR_BAR_INACTIVE:#5A5775}
urgent = ${env:COLOR_BAR_URGENT:#FF6B8B}

[bar/mybar]
; Геометрия
monitor = ${env:MONITOR:}
width = 100%
height = 28
offset-x = 0
offset-y = 0
radius = 12.0
fixed-center = true

; Цвета
background = ${colors.background}
foreground = ${colors.foreground}

; Шрифты (должны соответствовать dwm)
font-0 = "monospace:size=10;3"
font-1 = "FontAwesome:size=10;3"
font-2 = "Material Design Icons:size=10;3"

; Модули
modules-left = dwm-tags launcher
modules-center = xwindow
modules-right = pulseaudio memory cpu temperature battery date

; Оформление
line-size = 2
line-color = ${colors.primary}
padding-left = 0
padding-right = 2
module-margin-left = 1
module-margin-right = 1

; Прочие настройки
wm-restack = dwm
tray-position = right
tray-detached = false
tray-maxsize = 20
tray-background = ${colors.background-alt}

[module/dwm-tags]
type = internal/dwm
format = <label-state> <label-layout>
format-padding = 1

; Настройки тегов
label-focused = %name%
label-focused-background = ${colors.background-alt}
label-focused-foreground = ${colors.active}
label-focused-padding = 2
label-focused-radius = 8

label-occupied = %name%
label-occupied-background = ${colors.background-alt}
label-occupied-foreground = ${colors.inactive}
label-occupied-padding = 2
label-occupied-radius = 8

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-foreground = ${colors.background}
label-urgent-padding = 2
label-urgent-radius = 8

label-empty = %name%
label-empty-background = ${colors.background-alt}
label-empty-foreground = ${colors.inactive}40
label-empty-padding = 2
label-empty-radius = 8

; Layout индикатор
label-layout = 
label-layout-foreground = ${colors.secondary}
label-layout-padding = 2

[module/launcher]
type = custom/text
content = 
content-background = ${colors.background-alt}
content-foreground = ${colors.primary}
content-padding = 2
content-radius = 8
click-left = rofi -show drun

[module/xwindow]
type = internal/xwindow
label = %title:0:50:...%
label-maxlen = 50
label-foreground = ${colors.foreground-alt}
label-background = ${colors.background-alt}
label-padding = 2
label-radius = 8

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <ramp-volume> <label-volume>
format-volume-background = ${colors.background-alt}
format-volume-foreground = ${colors.foreground}
format-volume-padding = 2
format-volume-radius = 8

label-volume = %percentage%%
label-muted = 🔇
label-muted-foreground = ${colors.inactive}

ramp-volume-0 = 🔈
ramp-volume-1 = 🔉
ramp-volume-2 = 🔊

click-right = pavucontrol &
click-left = pactl set-sink-mute @DEFAULT_SINK@ toggle
scroll-up = pactl set-sink-volume @DEFAULT_SINK@ +5%
scroll-down = pactl set-sink-volume @DEFAULT_SINK@ -5%

[module/memory]
type = internal/memory
interval = 2
format-prefix = " "
format = <label>
format-background = ${colors.background-alt}
format-foreground = ${colors.foreground}
format-padding = 2
format-radius = 8

label = %percentage_used%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " "
format = <label>
format-background = ${colors.background-alt}
format-foreground = ${colors.foreground}
format-padding = 2
format-radius = 8

label = %percentage%%

[module/temperature]
type = internal/temperature
thermal-zone = 0
hwmon-path = /sys/class/hwmon/hwmon2/temp1_input
warn-temperature = 70
interval = 2

format = <ramp> <label>
format-background = ${colors.background-alt}
format-foreground = ${colors.foreground}
format-padding = 2
format-radius = 8

format-warn = <ramp> <label-warn>
format-warn-background = ${colors.alert}
format-warn-foreground = ${colors.background}
format-warn-padding = 2
format-warn-radius = 8

label = %temperature-c%
label-warn = %temperature-c%°C

ramp-0 = ❄
ramp-1 = 🌡
ramp-2 = 🔥

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 98
poll-interval = 5

format-charging = <animation-charging> <label-charging>
format-charging-background = ${colors.success}20
format-charging-foreground = ${colors.success}
format-charging-padding = 2
format-charging-radius = 8

format-discharging = <ramp-capacity> <label-discharging>
format-discharging-background = ${colors.background-alt}
format-discharging-foreground = ${colors.foreground}
format-discharging-padding = 2
format-discharging-radius = 8

format-full = <ramp-capacity> <label-full>
format-full-background = ${colors.success}20
format-full-foreground = ${colors.success}
format-full-padding = 2
format-full-radius = 8

label-charging = %percentage%%
label-discharging = %percentage%%
label-full = Fully charged

ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 

animation-charging-0 = 
animation-charging-1 = 
animation-charging-2 = 
animation-charging-3 = 
animation-charging-4 = 
animation-charging-framerate = 750

[module/date]
type = internal/date
interval = 1

date = %a %d %b
time = %H:%M

format = <label>
format-background = ${colors.background-alt}
format-foreground = ${colors.foreground-alt}
format-padding = 4
format-radius = 8

label =  %time%   %date%

[settings]
screenchange-reload = true
pseudo-transparency = false

[global/wm]
margin-top = 0
margin-bottom = 0
